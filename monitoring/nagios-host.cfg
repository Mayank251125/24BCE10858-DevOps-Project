# ==========================================
# NAGIOS MONITORING CONFIGURATION FOR VIT TECHFEST
# ==========================================

# 1. Host Definition for the Web Server Node
define host {
    use                     linux-server
    host_name               vit-techfest-host
    alias                   VIT TechFest App Server
    address                 127.0.0.1
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# 2. Service check for Local Docker Deployment (Port 8082)
define service {
    use                     local-service
    host_name               vit-techfest-host
    service_description     HTTP Availability (Docker Compose)
    check_command           check_http!-p 8082 -u /index.html
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# 3. Service check for Kubernetes NodePort Deployment (Port 30080)
define service {
    use                     local-service
    host_name               vit-techfest-host
    service_description     HTTP Availability (Kubernetes NodePort)
    check_command           check_http!-p 30080 -u /index.html
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# 4. Service check for Host CPU Utilization (Resource Monitoring)
define service {
    use                     local-service
    host_name               vit-techfest-host
    service_description     CPU Load check
    check_command           check_local_load!5.0,4.0,3.0!10.0,6.0,4.0
    check_interval          5
    retry_interval          1
}

# 5. Service check for Host Memory Utilization
define service {
    use                     local-service
    host_name               vit-techfest-host
    service_description     Memory check
    check_command           check_local_mem!10!20
    check_interval          5
    retry_interval          1
}
